<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSL Dictionary - Signix Gallery</title>
   <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <aside class="sidebar">
    <a href="index.html" class="logo">Sign<span>ix</span></a>

    <div class="nav-section">
      <div class="nav-title">Learning</div>
      <a class="nav-link" href="index.html">Library</a>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="index.html#revision">Revision Deck</a>
      <a class="nav-link" href="index.html#path">Fluency Path</a>
    </div>

    <div class="nav-section">
      <div class="nav-title">Community</div>
      <a class="nav-link active" href="gallery.html">KSL Dictionary</a>
      <a class="nav-link" href="about.html">About</a>
      <a class="nav-link" href="contact.html">Contact</a>
    </div>
  </aside>

  <main class="main">
    <nav class="topbar">
      <div style="display:flex;gap:2rem;">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="gallery.html" class="active">Dictionary</a>
      </div>
    </nav>

    <div class="content">
      <h1>KSL Dictionary</h1>
      <p class="subtext">Browse all Kenyan Sign Language signs A-Z. Search, filter, and bookmark signs to build your vocabulary.</p>

      <!-- Search & Filter -->
      <div class="controls">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search signs in English or Kiswahili...">
        </div>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="Beginner">Beginner</button>
          <button class="filter-btn" data-filter="Intermediate">Intermediate</button>
          <button class="filter-btn" data-filter="Advanced">Advanced</button>
          <button class="filter-btn" data-filter="saved">Saved</button>
        </div>
      </div>

      <!-- A-Z Jump Bar -->
      <div class="az-bar" id="azBar"></div>

      <div class="results-info" id="resultsInfo">Showing all signs</div>

      <!-- Gallery Grid -->
      <div id="galleryContainer"></div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal" id="videoModal">
    <div class="close-modal" onclick="closeModal()">×</div>
    <div class="modal-content">
      <div class="modal-video">
        <video id="modalVideo" controls autoplay></video>
      </div>
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <p class="modal-gloss" id="modalGloss"></p>
        <div class="modal-actions">
          <button class="btn btn-primary" onclick="addToRevision()">Add to Revision Deck</button>
          <button class="btn btn-secondary" onclick="toggleBookmark()">Save Sign</button>
        </div>
      </div>
    </div>
  </div>

<script>
  // COMPLETE KSL DICTIONARY DATA - Add your real signs here
  const KSL_DICTIONARY = [
    { id: 'hello', title: 'Hello', gloss: 'HABARI / HELLO', category: 'Greetings', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'H' },
    { id: 'good-morning', title: 'Good Morning', gloss: 'HABARI ZA ASUBUHI', category: 'Greetings', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'G' },
    { id: 'how-are-you', title: 'How are you?', gloss: 'HABARI YAKO?', category: 'Greetings', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'H' },
    { id: 'thank-you', title: 'Thank you', gloss: 'ASANTE', category: 'Greetings', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'T' },
    { id: 'mother', title: 'Mother', gloss: 'MAMA', category: 'Family', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'M' },
    { id: 'father', title: 'Father', gloss: 'BABA', category: 'Family', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'F' },
    { id: 'brother', title: 'Brother', gloss: 'KAKA', category: 'Family', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'B' },
    { id: 'sister', title: 'Sister', gloss: 'DADA', category: 'Family', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'S' },
    { id: 'one', title: 'One', gloss: 'MOJA', category: 'Numbers', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'O' },
    { id: 'two', title: 'Two', gloss: 'MBILI', category: 'Numbers', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'T' },
    { id: 'three', title: 'Three', gloss: 'TATU', category: 'Numbers', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'T' },
    { id: 'school', title: 'School', gloss: 'SHULE', category: 'School', level: 'Beginner', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'S' },
    { id: 'teacher', title: 'Teacher', gloss: 'MWALIMU', category: 'School', level: 'Intermediate', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'T' },
    { id: 'learn', title: 'Learn', gloss: 'JIFUNZA', category: 'Grammar', level: 'Intermediate', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'L' },
    { id: 'work', title: 'Work', gloss: 'KAZI', category: 'Workplace', level: 'Intermediate', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm', letter: 'W' },
  ];

  let savedSigns = JSON.parse(localStorage.getItem('signixSaved') || '[]');
  let revisionDeck = JSON.parse(localStorage.getItem('signixRevision') || '[]');
  let currentFilter = 'all';
  let currentSearch = '';
  let currentModalSign = null;

  // Initialize A-Z Bar
  function initAZBar() {
    const azBar = document.getElementById('azBar');
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const availableLetters = new Set(KSL_DICTIONARY.map(s => s.letter));

    azBar.innerHTML = letters.map(letter => `
      <a href="#section-${letter}" 
         class="az-link ${availableLetters.has(letter)? '' : 'disabled'}" 
         data-letter="${letter}">${letter}</a>
    `).join('');
  }

  // Render Gallery
  function renderGallery() {
    const container = document.getElementById('galleryContainer');
    let filtered = KSL_DICTIONARY;

    // Apply search
    if (currentSearch) {
      const search = currentSearch.toLowerCase();
      filtered = filtered.filter(s => 
        s.title.toLowerCase().includes(search) || 
        s.gloss.toLowerCase().includes(search) ||
        s.category.toLowerCase().includes(search)
      );
    }

    // Apply filter
    if (currentFilter === 'saved') {
      filtered = filtered.filter(s => savedSigns.includes(s.id));
    } else if (currentFilter!== 'all') {
      filtered = filtered.filter(s => s.level === currentFilter);
    }

    // Group by letter
    const grouped = {};
    filtered.forEach(sign => {
      if (!grouped[sign.letter]) grouped[sign.letter] = [];
      grouped[sign.letter].push(sign);
    });

    // Update results info
    document.getElementById('resultsInfo').textContent = 
      `Showing ${filtered.length} sign${filtered.length!== 1? 's' : ''}`;

    // Render
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>No signs found. Try a different search or filter.</p></div>';
      return;
    }

    container.innerHTML = Object.keys(grouped).sort().map(letter => `
      <div class="section-divider" id="section-${letter}">${letter}</div>
      <div class="card-grid">
        ${grouped[letter].map(sign => `
          <div class="dict-card" onclick="openModal('${sign.id}')">
            <div class="dict-thumb">
              <video muted loop onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0;">
                <source src="${sign.video}" type="video/webm">
              </video>
              <span class="level-badge">${sign.level}</span>
              <div class="bookmark-icon ${savedSigns.includes(sign.id)? 'saved' : ''}" 
                   onclick="event.stopPropagation();toggleBookmarkQuick('${sign.id}')">
                ${savedSigns.includes(sign.id)? '★' : '☆'}
              </div>
            </div>
            <div class="dict-body">
              <div class="dict-title">${sign.title}</div>
              <div class="dict-gloss">${sign.gloss}</div>
              <span class="dict-category">${sign.category}</span>
            </div>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  // Search
  document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderGallery();
  });

  // Filter
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderGallery();
    });
  });

  // Modal
  function openModal(signId) {
    const sign = KSL_DICTIONARY.find(s => s.id === signId);
    if (!sign) return;
    currentModalSign = sign;
    document.getElementById('modalVideo').src = sign.video;
    document.getElementById('modalTitle').textContent = sign.title;
    document.getElementById('modalGloss').textContent = sign.gloss + ' • ' + sign.category + ' • ' + sign.level;
    document.getElementById('videoModal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('videoModal').classList.remove('active');
    document.getElementById('modalVideo').pause();
    currentModalSign = null;
  }

  function addToRevision() {
    if (!currentModalSign) return;
    if (!revisionDeck.find(c => c.id === currentModalSign.id)) {
      revisionDeck.push({ id: currentModalSign.id, title: currentModalSign.title, due: Date.now() });
      localStorage.setItem('signixRevision', JSON.stringify(revisionDeck));
      alert(`Added "${currentModalSign.title}" to Revision Deck`);
    }
  }

  function toggleBookmark() {
    if (!currentModalSign) return;
    const idx = savedSigns.indexOf(currentModalSign.id);
    if (idx > -1) {
      savedSigns.splice(idx, 1);
    } else {
      savedSigns.push(currentModalSign.id);
    }
    localStorage.setItem('signixSaved', JSON.stringify(savedSigns));
    renderGallery();
    closeModal();
  }

  function toggleBookmarkQuick(signId) {
    const idx = savedSigns.indexOf(signId);
    if (idx > -1) {
      savedSigns.splice(idx, 1);
    } else {
      savedSigns.push(signId);
    }
    localStorage.setItem('signixSaved', JSON.stringify(savedSigns));
    renderGallery();
  }

  // Close modal on ESC or click outside
  document.getElementById('videoModal').addEventListener('click', (e) => {
    if (e.target.id === 'videoModal') closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // Init
  initAZBar();
  renderGallery();
</script>
</body>
</html>
