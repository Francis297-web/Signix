<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Theater - Signix</title>
  <link rel="stylesheet" href="css/styles.css?v=3">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="index.html" class="logo">
        <img src="Signix-logo.png" alt="Signix" style="height: 40px;">
      </a>
      <div class="nav-section">
        <div class="nav-title">Filter by Level</div>
        <button class="nav-link active" data-level="all">All Videos</button>
        <button class="nav-link" data-level="Beginner">Beginner</button>
        <button class="nav-link" data-level="Intermediate">Intermediate</button>
        <button class="nav-link" data-level="Advanced">Advanced</button>
      </div>
    </aside>

    <main class="main">
      <nav class="topbar">
        <div class="topbar-links">
          <a href="index.html">Home</a>
          <a href="library.html">Library</a>
          <a href="videos.html" class="active">Practice Theater</a>
          <a href="dashboard.html">Dashboard</a>
        </div>
      </nav>

      <div class="content">
        <div class="page-header">
          <h1>Practice Theater</h1>
          <p class="subtext">All KSL videos in one place. Practice without distractions.</p>
        </div>

        <div class="controls-bar">
          <div class="view-toggle">
            <button class="view-btn active" data-view="grid">Grid View</button>
            <button class="view-btn" data-view="list">List View</button>
          </div>
          <button class="btn btn-primary" onclick="startTheaterMode()">🎭 Theater Mode</button>
        </div>

        <div id="videosContainer" class="video-grid"></div>
      </div>

      <footer class="footer">
        <p class="text-muted text-center">
          Made by <strong>NEXORA TECHNOLOGIES</strong> - 0790357975
        </p>
      </footer>
    </main>
  </div>

  <div class="theater-mode" id="theaterMode">
    <div class="theater-header">
      <div class="theater-title" id="theaterTitle">KSL Practice</div>
      <div class="close-theater" onclick="closeTheater()">×</div>
    </div>
    <div class="theater-video">
      <iframe id="theaterVideo" frameborder="0" allowfullscreen></iframe>
    </div>
    <div class="theater-controls">
      <button class="btn btn-secondary" onclick="prevVideo()">⏮ Previous</button>
      <button class="btn btn-primary" onclick="togglePlayPause()">⏯ Play/Pause</button>
      <button class="btn btn-secondary" onclick="nextVideo()">Next ⏭</button>
    </div>
  </div>

  <script type="module" src="js/videos.js"></script>
</body>
</html>
