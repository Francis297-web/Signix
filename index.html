<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signix — Learn KSL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            blue: '#3b82f6',
            violet: '#6366f1',
            green: '#10b981',
            purple: '#8b5cf6',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0a0a14; }
   .glass { backdrop-filter: blur(16px); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
   .glow:hover { box-shadow: 0 0 30px rgba(99,102,241,0.3); transform: translateY(-4px); }
  </style>
</head>
<body class="text-gray-100 font-sans antialiased">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="hidden md:flex w-64 flex-col p-6 glass border-r border-white/10">
      <div class="flex items-center gap-3 mb-10">
        <img src="logo.png" class="h-9 w-auto" alt="Signix">
        <span class="text-xl font-bold bg-gradient-to-r from-blue to-purple bg-clip-text text-transparent">Signix</span>
      </div>
      <nav class="space-y-1">
        <p class="text-[11px] uppercase tracking-wider text-gray-500 px3 mb2">Learn</p>
        <a href="#" class="flex items-center gap3 px3 py2.5 rounded-lg bg-white/5 text-white">Home</a>
        <a href="#" class="flex items-center gap3 px3 py2.5 rounded-lg text-gray-400 hover:bg-white/5">Library</a>
        <a href="#" class="flex items-center gap3 px3 py2.5 rounded-lg text-gray-400 hover:bg-white/5">Practice</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1">
      <header class="sticky top-0 z-40 glass border-b border-white/10">
        <div class="flex items-center justify-between px-6 py4">
          <h1 class="text-2xl font-bold">Learn KSL with Signix</h1>
          <div class="flex items-center gap3">
            <span class="text-sm text-gray-400">Deaf-first learning</span>
          </div>
        </div>
      </header>

      <div class="p-6 max-w-6xl mx-auto">
        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap4 mb-8">
          <div class="glass rounded-2xl p5">
            <div class="text-3xl font-bold text-green" id="streak">0</div>
            <div class="text-xs text-gray-400 mt1 uppercase tracking-wide">Day Streak</div>
          </div>
          <div class="glass rounded-2xl p5">
            <div class="text-3xl font-bold text-blue" id="mastered">0</div>
            <div class="text-xs text-gray-400 mt1 uppercase tracking-wide">Mastered</div>
          </div>
          <div class="glass rounded-2xl p5">
            <div class="text-3xl font-bold text-violet" id="videos">5</div>
            <div class="text-xs text-gray-400 mt1 uppercase tracking-wide">Videos</div>
          </div>
          <div class="glass rounded-2xl p5">
            <div class="text-3xl font-bold text-purple" id="progress">0%</div>
            <div class="text-xs text-gray-400 mt1 uppercase tracking-wide">Progress</div>
          </div>
        </div>

        <!-- Videos Grid -->
        <div id="videoGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap6"></div>
      </div>
    </main>
  </div>

  <!-- Video Modal -->
  <div id="videoModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-50 hidden items-center justify-center p4">
    <div class="relative w-full max-w-4xl">
      <button onclick="closeVideo()" class="absolute -top12 right0 text-white/70 hover:text-white text-3xl">×</button>
      <video id="modalVideo" controls autoplay class="w-full rounded-2xl shadow-2xl"></video>
      <h3 id="modalTitle" class="mt4 text-xl font-semibold"></h3>
    </div>
  </div>

<script>
// YOUR ACTUAL VIDEOS - from your image folder
const videos = [
  {
    id: 'hello',
    title: 'Hello / Habari',
    gloss: 'HABARI',
    category: 'Greetings',
    level: 'Beginner',
    file: 'Hello-ksl.mp4',
    thumb: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600',
    color: 'blue'
  },
  {
    id: 'family',
    title: 'Family Members',
    gloss: 'JAMII',
    category: 'Family',
    level: 'Beginner',
    file: 'family members-ksl.mp4',
    thumb: 'https://images.unsplash.com/photo-1511895426328-dc8714191300?w=600',
    color: 'green'
  },
  {
    id: 'time',
    title: 'Telling Time',
    gloss: 'KUSEMA SAA',
    category: 'Time',
    level: 'Beginner',
    file: 'telling time-ksl.mp4',
    thumb: 'https://images.unsplash.com/photo-1501139083538-0139583c060f?w=600',
    color: 'violet'
  },
  {
    id: 'school',
    title: 'School / Shule',
    gloss: 'SHULE',
    category: 'School',
    level: 'Intermediate',
    file: 'school sign-ksl.mp4',
    thumb: 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=600',
    color: 'purple'
  },
  {
    id: 'alphabet',
    title: 'KSL Alphabet & Numbers',
    gloss: 'ALFABETI',
    category: 'Numbers',
    level: 'Beginner',
    file: 'ksl_alphabet_numbers_web_v0.2.pdf',
    thumb: 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=600',
    color: 'blue',
    isPdf: true
  }
];

let completed = JSON.parse(localStorage.getItem('signix_done')||'[]');

function renderVideos() {
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = videos.map(v => {
    const done = completed.includes(v.id);
    return `
    <div class="group glass rounded-2xl overflow-hidden glow transition-all duration-300 cursor-pointer" onclick="${v.isPdf? `window.open('${v.file}')` : `playVideo('${v.file}','${v.title}')`}">
      <div class="relative aspect-video bg-black overflow-hidden">
        ${v.isPdf? `
          <div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-${v.color}/20 to-purple/20">
            <div class="text-center">
              <div class="text-5xl mb2">📄</div>
              <div class="text-sm font-medium">PDF Guide</div>
            </div>
          </div>
        ` : `
          <video muted loop playsinline preload="metadata" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0">
            <source src="${v.file}" type="video/mp4">
          </video>
          <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
            <div class="w-14 h-14 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center">
              <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        `}
        <div class="absolute top3 right3">
          <span class="px2.5 py1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-${v.color}/20 text-${v.color} border border-${v.color}/30 backdrop-blur-md">${v.level}</span>
        </div>
        ${done? `<div class="absolute top3 left3 w6 h6 rounded-full bg-green flex items-center justify-center"><svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>` : ''}
      </div>
      <div class="p5">
        <div class="flex items-start justify-between mb2">
          <div>
            <h3 class="font-semibold text-[15px] leading-snug">${v.title}</h3>
            <p class="text-[12px] text-gray-500 mt0.5 font-mono">${v.gloss}</p>
          </div>
        </div>
        <div class="flex items-center justify-between mt4">
          <span class="text-[11px] text-gray-500">${v.category}</span>
          <button onclick="event.stopPropagation(); toggleDone('${v.id}')" class="text-[12px] font-medium px3 py1.5 rounded-lg ${done? 'bg-green/20 text-green' : 'bg-white/5 text-gray-300 hover:bg-white/10'} transition-colors">
            ${done? '✓ Mastered' : 'Mark done'}
          </button>
        </div>
      </div>
    </div>
  `}).join('');
  updateStats();
}

function playVideo(file, title) {
  document.getElementById('modalVideo').src = file;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('videoModal').classList.remove('hidden');
  document.getElementById('videoModal').classList.add('flex');
}

function closeVideo() {
  document.getElementById('modalVideo').pause();
  document.getElementById('videoModal').classList.add('hidden');
}

function toggleDone(id) {
  if(completed.includes(id)) completed = completed.filter(x=>x!==id);
  else completed.push(id);
  localStorage.setItem('signix_done', JSON.stringify(completed));
  renderVideos();
}

function updateStats() {
  document.getElementById('mastered').textContent = completed.length;
  document.getElementById('progress').textContent = Math.round(completed.length/videos.length*100) + '%';
  document.getElementById('streak').textContent = localStorage.getItem('streak') || '1';
}

// Init
renderVideos();
document.getElementById('videoModal').onclick = (e) => { if(e.target.id==='videoModal') closeVideo(); };
</script>
</body>
</html>
