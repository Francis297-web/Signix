<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Signix</title>
  <link rel="stylesheet" href="css/styles.css?v=3">
</head>
<body>
  <div class="auth-container">
    <div class="logo-section">
      <img src="sINGNIFIX.png" alt="Signix" style="height: 60px; margin-bottom: 1rem;">
      <p class="tagline">Welcome back to Signix</p>
    </div>

    <div class="auth-card">
      <h1>Log In</h1>
      <p class="subtext">Continue your KSL fluency journey</p>

      <div class="alert alert-error" id="errorAlert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Log In</button>
      </form>

      <div class="divider">or</div>

      <button type="button" class="btn btn-secondary btn-full" id="googleBtn">Continue with Google</button>

      <div class="auth-footer">
        <a href="#" id="forgotLink">Forgot password?</a><br>
        Don't have an account? <a href="register.html">Sign up</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { loginUser, signInWithGoogle, resetPassword, getErrorMessage } from './js/auth.js';
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorAlert.style.display = 'none';
      const email = form.email.value.trim();
      const password = form.password.value;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';
      const result = await loginUser(email, password);
      if (result.success) window.location.href = 'dashboard.html';
      else {
        errorAlert.textContent = getErrorMessage(result.error);
        errorAlert.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    });

    document.getElementById('googleBtn').addEventListener('click', async () => {
      const result = await signInWithGoogle();
      if (result.success) window.location.href = 'dashboard.html';
      else {
        errorAlert.textContent = getErrorMessage(result.error);
        errorAlert.style.display = 'block';
      }
    });

    document.getElementById('forgotLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = prompt('Enter your email to reset password:');
      if (email) {
        const result = await resetPassword(email);
        if (result.success) alert('Password reset email sent! Check your inbox.');
        else {
          errorAlert.textContent = getErrorMessage(result.error);
          errorAlert.style.display = 'block';
        }
      }
    });
  </script>
</body>
</html>
