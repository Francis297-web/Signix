<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About - Signix</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --accent: #22c55e;
    --accent2: #3b82f6;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #334155;
  }
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar - matches index.html */
 .sidebar {
    width: 260px;
    background: #0b1220;
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    overflow-y: auto;
    flex-shrink: 0;
  }
 .logo {
    padding: 0 1.5rem 1.5rem;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
    text-decoration: none;
    display: block;
  }
 .logo span { color: var(--accent2); }
 .nav-section { margin-bottom: 1.5rem; }
 .nav-title {
    padding: 0.5rem 1.5rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
 .nav-link {
    display: block;
    padding: 0.6rem 1.5rem;
    color: var(--text);
    text-decoration: none;
    border-left: 3px solid transparent;
  }
 .nav-link:hover,.nav-link.active {
    background: var(--card);
    border-left-color: var(--accent);
  }

  /* Main content */
 .main {
    flex: 1;
    overflow-y: auto;
  }
 .topbar {
    background: #0b1220;
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    gap: 2rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
 .topbar a {
    color: var(--muted);
    text-decoration: none;
    font-weight: 600;
  }
 .topbar a.active,.topbar a:hover { color: var(--accent); }

 .content {
    padding: 2rem;
    max-width: 900px;
  }

  h1 { font-size: 2.5rem; margin-bottom: 1rem; }
  h2 { 
    font-size: 1.75rem; 
    margin: 2.5rem 0 1rem; 
    color: var(--accent);
  }
  h3 {
    font-size: 1.25rem;
    margin: 1.5rem 0 0.5rem;
  }
  p { 
    line-height: 1.7; 
    color: var(--muted); 
    margin-bottom: 1rem;
    font-size: 1.05rem;
  }
 .highlight {
    color: var(--text);
    font-weight: 600;
  }

 .founder-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    margin: 2rem 0;
    display: flex;
    gap: 2rem;
    align-items: center;
  }
 .founder-avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    flex-shrink: 0;
