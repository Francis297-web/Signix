<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSL Library - Signix</title>
  <link rel="stylesheet" href="css/styles.css?v=3">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="index.html" class="logo">
        <img src="Signix-logo.png" alt="Signix" style="height: 40px;">
      </a>
      <div class="nav-section">
        <div class="nav-title">KSL Categories</div>
        <button class="nav-link active" data-category="all">All Signs</button>
        <button class="nav-link" data-category="greetings">Greetings</button>
        <button class="nav-link" data-category="family">Family</button>
        <button class="nav-link" data-category="numbers">Numbers</button>
        <button class="nav-link" data-category="time">Time</button>
        <button class="nav-link" data-category="school">School</button>
        <button class="nav-link" data-category="grammar">Grammar</button>
      </div>
    </aside>

    <main class="main">
      <nav class="topbar">
        <div class="topbar-links">
          <a href="index.html">Home</a>
          <a href="library.html" class="active">Library</a>
          <a href="videos.html">Practice Theater</a>
          <a href="dashboard.html">Dashboard</a>
        </div>
        <div class="search-container">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="Search signs...">
        </div>
      </nav>

      <div class="content">
        <div class="page-header">
          <h1>KSL Library</h1>
          <p class="subtext">Browse all Kenyan Sign Language signs. Click any card to practice.</p>
        </div>
        <div id="categoriesContainer"></div>
      </div>

      <footer class="footer">
        <p class="text-muted text-center">
          Made by <strong>NEXORA TECHNOLOGIES</strong> - 0790357975
        </p>
      </footer>
    </main>
  </div>

  <script type="module" src="js/library.js"></script>
</body>
</html>
